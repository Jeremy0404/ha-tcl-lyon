version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: ci

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      # Pinned transitively by pytest-homeassistant-custom-component; let it drive these.
      - dependency-name: pytest
      - dependency-name: pytest-asyncio
    commit-message:
      prefix: chore
